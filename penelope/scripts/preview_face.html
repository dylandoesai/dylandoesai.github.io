<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Penelope Face Preview</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #status { position: fixed; top: 10px; left: 10px; color: #0ff;
            font-family: monospace; font-size: 12px; }
</style>
</head>
<body>
<canvas id="face"></canvas>
<div id="status">loading…</div>
<script type="module">
  import { PenelopeFace } from '../renderer/visualizer/penelope-face.js';

  // Shim window.penelope for asset loading
  window.penelope = {
    readAsset: async (rel) => {
      // Try fetch via file:// URL
      const url = new URL('../' + rel, import.meta.url).href;
      const r = await fetch(url);
      const buf = await r.arrayBuffer();
      // base64 encode
      let bin = '';
      const bytes = new Uint8Array(buf);
      for (let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin);
    },
    readAssetBinary: async (rel) => {
      const url = new URL('../' + rel, import.meta.url).href;
      const r = await fetch(url);
      return new Uint8Array(await r.arrayBuffer());
    },
  };

  const status = document.getElementById('status');
  status.textContent = 'creating face…';
  const face = new PenelopeFace(document.getElementById('face'));
  face.uniforms.uBootProgress.value = 1.0;   // skip boot animation
  face.start();
  status.textContent = 'rendering';
  setTimeout(() => { status.textContent = 'rendering @ 60fps'; }, 1500);
  // Idle state — neutral expression, gentle breath
  face.setIdle();
  face.setMode('warm');
</script>
</body>
</html>
